        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #FAFAFA;
        }

        /* Animasi Orbs Fluid */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }

        /* Efek Input Modern */
        .modern-input {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid rgba(226, 232, 240, 0.8);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modern-input:focus {
            background: rgba(255, 255, 255, 1);
            border-color: #f43f5e;
            box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.1), inset 0 2px 4px rgba(0,0,0,0.01);
        }

        /* Desain Garis Pemisah & Potongan Tiket Presisi */
        .ticket-divider {
            position: relative;
            width: 100%;
            height: 0;
            border-top: 2px dashed rgba(226, 232, 240, 0.8);
            margin: 0;
            flex-shrink: 0;
        }
        .ticket-divider::before, .ticket-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 24px;
            height: 24px;
            background-color: #FAFAFA;
            border-radius: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }
        .ticket-divider::before { left: -12px; }
        .ticket-divider::after { right: -12px; }

        /* Smooth reveal transition */
        .spring-reveal {
            animation: springUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }
        @keyframes springUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
